name: Publish to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @g2crowd/elevate version 2>/dev/null || echo "none")
          echo "local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-canary:
    if: github.event_name == 'pull_request' && github.event.label.name == 'publish-canary'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Apply canary version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"

          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"

          VIEW_ERROR=$(mktemp)
          if npm view "@g2crowd/elevate@${CANARY_VERSION}" version >/dev/null 2>"$VIEW_ERROR"; then
            echo "::error::@g2crowd/elevate@${CANARY_VERSION} is already published. Add the publish-canary label to a PR at a different commit."
            exit 1
          fi

          if ! grep -q "E404" "$VIEW_ERROR"; then
            cat "$VIEW_ERROR"
            exit 1
          fi

          npm version --no-git-tag-version "$CANARY_VERSION"

      - name: Publish canary to NPM
        run: npm publish --provenance --tag canary --access public

      - name: Comment on pull request
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          CANARY_VERSION: ${{ steps.version.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packageIdentifier = `@g2crowd/elevate@${process.env.CANARY_VERSION}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `\`${packageIdentifier}\` has been published to npm with the \`canary\` dist tag.`,
            });

      - name: Write install summary
        shell: bash
        run: |
          {
            echo "### Published Elevate canary"
            echo ""
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Ref: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Dist tag: \`canary\`"
            echo ""
            echo "\`\`\`sh"
            echo "yarn add @g2crowd/elevate@canary"
            echo "yarn add @g2crowd/elevate@${{ steps.version.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
