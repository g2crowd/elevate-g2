name: Publish Canary to NPM

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch, tag, or SHA to publish. Leave blank to use the triggering ref.
        required: false
        default: ""
        type: string

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.branch }}
        run: |
          if [ -n "$REQUESTED_REF" ]; then
            echo "ref=$REQUESTED_REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Apply canary version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"

          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"

          VIEW_ERROR=$(mktemp)
          if npm view "@g2crowd/elevate@${CANARY_VERSION}" version >/dev/null 2>"$VIEW_ERROR"; then
            echo "::error::@g2crowd/elevate@${CANARY_VERSION} is already published. Dispatch this workflow against a different commit."
            exit 1
          fi

          if ! grep -q "E404" "$VIEW_ERROR"; then
            cat "$VIEW_ERROR"
            exit 1
          fi

          npm version --no-git-tag-version "$CANARY_VERSION"

      - name: Publish canary to NPM
        run: npm publish --provenance --tag canary --access public

      - name: Write install summary
        shell: bash
        run: |
          {
            echo "### Published Elevate canary"
            echo ""
            echo "- Ref: \`${{ steps.ref.outputs.ref }}\`"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Dist tag: \`canary\`"
            echo ""
            echo "\`\`\`sh"
            echo "yarn add @g2crowd/elevate@canary"
            echo "yarn add @g2crowd/elevate@${{ steps.version.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
