name: Rule PR Title semantics

# Public-repo equivalent of g2crowd/gh-actions/.github/workflows/rule-pr-title-semantics.yml.
#
# elevate-g2 is a PUBLIC repo and gh-actions is INTERNAL; GitHub Actions cannot run an
# internal reusable workflow from a public repo, so the org-level required workflow can
# never report and blocks all PRs. This vendored copy provides the Conventional-Commit
# PR-title check using only public actions. The JIRA-ticket validation from the internal
# workflow is intentionally omitted because it requires org Atlassian secrets that are
# (and should be) unavailable to public-repo Actions.

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: write

jobs:
  conventional-pr-title:
    name: Rule PR Title semantics
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        id: lint_pr_title
        with:
          ignoreLabels: |
            dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add PR title lint error
        uses: marocchino/sticky-pull-request-comment@v3
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            We require pull request titles to follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) and it looks like your proposed title needs to be adjusted.

            _Note: This check re-runs automatically whenever you edit the PR title or push new commits._

      - name: Remove PR title lint error
        if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint-error
          delete: true
