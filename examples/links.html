<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<a class="back-link" href="./index.html">&larr; All Components</a>
<h1>Links</h1>
<p class="subtitle">CSS classes: <code>.a</code>, <code>.a--{variant}</code>, <code>.a--{size}</code></p>

<h2>Variants</h2>
<div class="component-col" elv>
  <a href="#" elv>Default link</a>
  <a href="#" class="a--underline" elv>Underlined link</a>
  <a href="#" class="a--subtle" elv>Subtle link</a>
  <a href="#" class="a--subtle a--underline" elv>Subtle underlined link</a>
</div>

<h2>Sizes</h2>
<div class="component-row" elv>
  <a href="#" class="a a--xs" elv>Extra Small</a>
  <a href="#" class="a a--sm" elv>Small</a>
  <a href="#" class="a a--md" elv>Medium</a>
</div>

<h2>Font Weight</h2>
<div class="component-row" elv>
  <a href="#" class="a" elv>Normal weight</a>
  <a href="#" class="a a--fw-semibold" elv>Semibold link</a>
</div>

<h2>Reset (for wrapping interactive elements)</h2>
<div class="component-row" elv>
  <a href="#" class="a--reset" elv>Reset link — no hover/focus styles</a>
</div>

</body>
</html>
