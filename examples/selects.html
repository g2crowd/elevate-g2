<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selects — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<a class="back-link" href="./index.html">&larr; All Components</a>
<h1>Selects</h1>
<p class="subtitle">CSS classes: <code>.elv-select</code>, <code>.elv-select--{size}</code></p>

<h2>Sizes</h2>
<div class="component-col" elv>
  <select class="elv-select elv-select--sm" elv>
    <option>Small select</option>
    <option>Option 2</option>
    <option>Option 3</option>
  </select>
  <select class="elv-select elv-select--md" elv>
    <option>Medium select</option>
    <option>Option 2</option>
    <option>Option 3</option>
  </select>
  <select class="elv-select elv-select--lg" elv>
    <option>Large select</option>
    <option>Option 2</option>
    <option>Option 3</option>
  </select>
</div>

</body>
</html>
