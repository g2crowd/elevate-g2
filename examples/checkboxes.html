<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkboxes — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Checkboxes</h1>
<p class="subtitle">CSS classes: <code>.checkbox</code>, <code>.checkbox--sm</code>, <code>.checkbox--lg</code></p>

<h2>Sizes — unchecked</h2>
<div class="component-row" elv>
  <input class="checkbox checkbox--sm" type="checkbox">
  <input class="checkbox" type="checkbox">
  <input class="checkbox checkbox--lg" type="checkbox">
</div>

<h2>Sizes — checked</h2>
<div class="component-row" elv>
  <input class="checkbox checkbox--sm" type="checkbox" checked>
  <input class="checkbox" type="checkbox" checked>
  <input class="checkbox checkbox--lg" type="checkbox" checked>
</div>

<h2>Disabled — unchecked</h2>
<div class="component-row" elv>
  <input class="checkbox checkbox--sm" type="checkbox" disabled>
  <input class="checkbox" type="checkbox" disabled>
  <input class="checkbox checkbox--lg" type="checkbox" disabled>
</div>

<h2>Disabled — checked</h2>
<div class="component-row" elv>
  <input class="checkbox checkbox--sm" type="checkbox" disabled checked>
  <input class="checkbox" type="checkbox" disabled checked>
  <input class="checkbox checkbox--lg" type="checkbox" disabled checked>
</div>

<h2>With label</h2>
<div class="component-col" elv style="gap: 0.75rem;">
  <div class="elv-label__wrapper">
    <input class="checkbox" type="checkbox" id="cb-terms">
    <label class="elv-label elv-label--sm elv-label--normal" for="cb-terms">Accept terms and conditions</label>
  </div>
  <div class="elv-label__wrapper">
    <input class="checkbox checkbox--sm" type="checkbox" checked id="cb-newsletter">
    <label class="elv-label elv-label--sm elv-label--normal" for="cb-newsletter">Subscribe to newsletter</label>
  </div>
  <div class="elv-label__wrapper">
    <input class="checkbox" type="checkbox" disabled id="cb-locked">
    <label class="elv-label elv-label--sm elv-label--normal elv-label--disabled" for="cb-locked">Feature locked</label>
  </div>
</div>

</body>
</html>
