<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Input — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Search Input</h1>
<p class="subtitle">Uses <code>.elv-input</code> on <code>&lt;input type="search"&gt;</code> with a search icon. No additional CSS needed.</p>

<h2>Sizes</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div style="position: relative;">
      <label class="elv-label elv-label--sm">Small</label>
      <div style="position: relative;">
        <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);" class="icon icon--xs" viewBox="0 0 20 20" fill="#9E9CA6" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 3C5.46243 3 3 5.46243 3 8.5C3 11.5376 5.46243 14 8.5 14C9.83879 14 11.0659 13.5217 12.0196 12.7266L16.1465 16.8536L16.8536 16.1465L12.7266 12.0196C13.5217 11.0659 14 9.83879 14 8.5C14 5.46243 11.5376 3 8.5 3ZM4 8.5C4 6.01472 6.01472 4 8.5 4C10.9853 4 13 6.01472 13 8.5C13 10.9853 10.9853 13 8.5 13C6.01472 13 4 10.9853 4 8.5Z"/>
        </svg>
        <input type="search" class="elv-input elv-input--sm" placeholder="Search..." style="padding-left: 2rem;">
      </div>
    </div>
    <div style="position: relative;">
      <label class="elv-label">Medium</label>
      <div style="position: relative;">
        <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);" class="icon icon--sm" viewBox="0 0 20 20" fill="#9E9CA6" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 3C5.46243 3 3 5.46243 3 8.5C3 11.5376 5.46243 14 8.5 14C9.83879 14 11.0659 13.5217 12.0196 12.7266L16.1465 16.8536L16.8536 16.1465L12.7266 12.0196C13.5217 11.0659 14 9.83879 14 8.5C14 5.46243 11.5376 3 8.5 3ZM4 8.5C4 6.01472 6.01472 4 8.5 4C10.9853 4 13 6.01472 13 8.5C13 10.9853 10.9853 13 8.5 13C6.01472 13 4 10.9853 4 8.5Z"/>
        </svg>
        <input type="search" class="elv-input elv-input--md" placeholder="Search products..." style="padding-left: 2.25rem;">
      </div>
    </div>
    <div style="position: relative;">
      <label class="elv-label">Large</label>
      <div style="position: relative;">
        <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);" class="icon icon--md" viewBox="0 0 20 20" fill="#9E9CA6" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 3C5.46243 3 3 5.46243 3 8.5C3 11.5376 5.46243 14 8.5 14C9.83879 14 11.0659 13.5217 12.0196 12.7266L16.1465 16.8536L16.8536 16.1465L12.7266 12.0196C13.5217 11.0659 14 9.83879 14 8.5C14 5.46243 11.5376 3 8.5 3ZM4 8.5C4 6.01472 6.01472 4 8.5 4C10.9853 4 13 6.01472 13 8.5C13 10.9853 10.9853 13 8.5 13C6.01472 13 4 10.9853 4 8.5Z"/>
        </svg>
        <input type="search" class="elv-input elv-input--lg" placeholder="Search categories..." style="padding-left: 2.5rem;">
      </div>
    </div>
  </div>
</div>

<h2>States</h2>
<div class="component-col" elv>
  <div class="component-row">
    <div>
      <label class="elv-label">Disabled</label>
      <input type="search" class="elv-input elv-input--md" placeholder="Search..." disabled>
    </div>
    <div>
      <label class="elv-label">Read-only</label>
      <input type="search" class="elv-input elv-input--md" value="Salesforce" readonly>
    </div>
  </div>
</div>

</body>
</html>
