<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Groups — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./nav.js"></script>
</head>
<body>

<h1>Button Groups</h1>
<p class="subtitle">CSS classes: <code>.elv-button-group</code>, <code>.elv-button-group--horizontal</code>, <code>.elv-button-group--vertical</code>, <code>.elv-button-group--connected</code></p>

<h2>Horizontal</h2>
<div class="component-row" elv>
  <div class="elv-button-group elv-button-group--horizontal" elv>
    <button class="btn btn--secondary btn--md" elv type="button">Overview</button>
    <button class="btn btn--secondary btn--md" elv type="button">Details</button>
    <button class="btn btn--secondary btn--md" elv type="button">Activity</button>
  </div>
</div>

<h2>Vertical</h2>
<div class="component-row" elv>
  <div class="elv-button-group elv-button-group--vertical" elv>
    <button class="btn btn--secondary btn--md" elv type="button">Save Draft</button>
    <button class="btn btn--secondary btn--md" elv type="button">Publish</button>
    <button class="btn btn--secondary btn--md" elv type="button">Schedule</button>
  </div>
</div>

<h2>Connected Horizontal</h2>
<div class="component-row" elv>
  <div class="elv-button-group elv-button-group--connected elv-button-group--horizontal" elv>
    <button class="btn btn--secondary btn--md" elv type="button">Day</button>
    <button class="btn btn--secondary btn--md" elv type="button">Week</button>
    <button class="btn btn--secondary btn--md" elv type="button">Month</button>
  </div>
</div>

<h2>Connected Vertical</h2>
<div class="component-row" elv>
  <div class="elv-button-group elv-button-group--connected elv-button-group--vertical" elv>
    <button class="btn btn--secondary btn--md" elv type="button">Copy Link</button>
    <button class="btn btn--secondary btn--md" elv type="button">Duplicate</button>
    <button class="btn btn--secondary btn--md" elv type="button">Archive</button>
  </div>
</div>

</body>
</html>
