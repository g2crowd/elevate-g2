<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./dark-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Buttons — Elevate</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="/token-editor.css">
  <script src="./nav.js"></script>
  <script src="/token-editor.js" defer></script>
</head>
<body>

<h1>Radio Buttons</h1>
<p class="subtitle">CSS classes: <code>.radio-btn</code>, <code>.radio-btn--sm</code>, <code>.radio-btn--lg</code></p>

<h2>Sizes — unselected</h2>
<div class="component-row" elv>
  <input class="radio-btn radio-btn--sm" type="radio" name="size-demo-1">
  <input class="radio-btn" type="radio" name="size-demo-2">
  <input class="radio-btn radio-btn--lg" type="radio" name="size-demo-3">
</div>

<h2>Sizes — selected</h2>
<div class="component-row" elv>
  <input class="radio-btn radio-btn--sm" type="radio" name="checked-1" checked>
  <input class="radio-btn" type="radio" name="checked-2" checked>
  <input class="radio-btn radio-btn--lg" type="radio" name="checked-3" checked>
</div>

<h2>Disabled</h2>
<div class="component-row" elv>
  <input class="radio-btn" type="radio" name="dis-1" disabled>
  <input class="radio-btn" type="radio" name="dis-2" disabled checked>
</div>

<h2>Radio group with labels</h2>
<div class="component-col" elv style="gap: 0.75rem;">
  <div class="elv-label__wrapper">
    <input class="radio-btn" type="radio" name="plan" id="plan-free" value="free" checked>
    <label class="elv-label elv-label--sm" for="plan-free">Free</label>
  </div>
  <div class="elv-label__wrapper">
    <input class="radio-btn" type="radio" name="plan" id="plan-pro" value="pro">
    <label class="elv-label elv-label--sm" for="plan-pro">Pro</label>
  </div>
  <div class="elv-label__wrapper">
    <input class="radio-btn" type="radio" name="plan" id="plan-enterprise" value="enterprise">
    <label class="elv-label elv-label--sm" for="plan-enterprise">Enterprise</label>
  </div>
  <div class="elv-label__wrapper">
    <input class="radio-btn" type="radio" name="plan" id="plan-disabled" value="legacy" disabled>
    <label class="elv-label elv-label--sm elv-label--disabled" for="plan-disabled">Legacy (unavailable)</label>
  </div>
</div>

<h2>Small radio group</h2>
<div class="component-col" elv style="gap: 0.5rem;">
  <div class="elv-label__wrapper elv-label__wrapper--sm">
    <input class="radio-btn radio-btn--sm" type="radio" name="freq" id="freq-daily" value="daily" checked>
    <label class="elv-label elv-label--xs" for="freq-daily">Daily</label>
  </div>
  <div class="elv-label__wrapper elv-label__wrapper--sm">
    <input class="radio-btn radio-btn--sm" type="radio" name="freq" id="freq-weekly" value="weekly">
    <label class="elv-label elv-label--xs" for="freq-weekly">Weekly</label>
  </div>
  <div class="elv-label__wrapper elv-label__wrapper--sm">
    <input class="radio-btn radio-btn--sm" type="radio" name="freq" id="freq-monthly" value="monthly">
    <label class="elv-label elv-label--xs" for="freq-monthly">Monthly</label>
  </div>
</div>

</body>
</html>
